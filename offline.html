<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#10b981">
  <title>Terapia | Offline</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.82);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #10b981;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      font-family: "Inter", "Segoe UI", sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(circle at top left, rgba(16, 185, 129, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.18), transparent 35%),
        var(--bg-dark);
    }

    .panel {
      width: min(100%, 520px);
      padding: 2rem;
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      background: var(--bg-card);
      backdrop-filter: blur(18px);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 1.25rem;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 18px 36px rgba(16, 185, 129, 0.22);
      font-size: 2rem;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    button {
      margin-top: 1.5rem;
      border: none;
      border-radius: 14px;
      padding: 0.9rem 1.2rem;
      font: inherit;
      font-weight: 700;
      color: white;
      background: var(--accent-primary);
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.08);
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="icon">+</div>
    <h1>Sei offline</h1>
    <p>L'app e' installata e i file principali sono disponibili, ma i dati cloud richiedono una connessione per aggiornarsi.</p>
    <button type="button" onclick="location.reload()">Riprova</button>
  </main>
</body>
</html>
